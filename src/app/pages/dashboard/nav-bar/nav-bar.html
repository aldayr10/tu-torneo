<div class="navbar">

  <div class="nav-left">
    <span class="logo">Torneos de Fútbol</span>
  </div>

  <div class="nav-right">

    <span class="welcome">
      Bienvenido, <b>{{user.name}}</b>
    </span>

    <button class="icon-btn notification" (click)="openNotifications()">
      <span class="material-symbols-outlined">person_add</span>
    </button>

    <button class="icon-btn notification" (click)="openNotifications()">
      <span class="material-symbols-outlined">notifications</span>
      <span class="badge">1</span>
    </button>

    <div class="user-menu">

      <button class="profile-btn" (click)="toggleMenu()">
        Perfil ▼
      </button>

      @if(menuOpen){
      <div class="dropdown">

        <button (click)="editProfile()"><span class="material-symbols-outlined">settings</span>
          Editar perfil
        </button>

        <button (click)="logout()"><span class="material-symbols-outlined">output</span>
          Cerrar sesión
        </button>

      </div>
      }

    </div>

  </div>

</div>

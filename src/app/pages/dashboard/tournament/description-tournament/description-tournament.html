<div class="card">

    <h2>Descripción del Torneo</h2>
    <div class="alineado">
        <h3>Torneo:</h3>
        <label>{{ tournamentData.name }}</label>
    </div>

    <div class="alineado">
        <h3 for="">Creado Por:</h3>
        <label>{{ tournamentData.owner }}</label>
    </div>

    <div class="area">
        <h3 for="">Descricion:</h3>
        <label>{{ tournamentData.descrilabeltion }}</label>
    </div>

    <div class="alineado">
        <h3 for="">Categoria:</h3>
        <label>{{ tournamentData.category }}</label>
    </div>

    <div class="actions">
        <button  (click)="close()">cerrar</button>
        <button class="inscri" (click)="inscribirse()">Inscribirse</button>
    </div>

</div>

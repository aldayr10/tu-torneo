<div class="container">

  <div class="icon">🏆</div>

  <h2>Crear Nuevo Torneo</h2>
  <p class="subtitle">Configura tu competencia de fútbol</p>

  <form [formGroup]="tournamentForm" (ngSubmit)="crearTorneo()">

    <label>Nombre del Torneo</label>
    <input type="text" formControlName="name" placeholder="Ej: Copa de Campeones 2026">

    <label>Descripción del Torneo</label>
    <textarea formControlName="description" placeholder="Ej: Torneo femenino mayores de 18 años..."></textarea>

    <label>Tipo de Torneo</label>
    <select formControlName="category">
      <option value="">Selecciona el tipo de torneo</option>
      <option>Eliminación directa</option>
      <option>Todos contra todos</option>
      <option>Fase de grupos</option>
    </select>

    <button type="submit">Crear Torneo</button>

  </form>

</div>

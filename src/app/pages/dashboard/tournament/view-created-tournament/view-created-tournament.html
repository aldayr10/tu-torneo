<h2>🏆 Mis Torneos</h2>

<div *ngIf="tournaments.length === 0" class="empty-state">

  <div class="empty-icon">🏆</div>

  <p>Aún no has creado ningún torneo</p>
  <span>¡Usa el formulario para crear el primero!</span>

</div>

<div *ngIf="tournaments.length > 0" class="tournament-list">

  <div *ngFor="let tournament of tournaments" class="tournament-card">

    <h3>{{ tournament.name }}</h3>

    <p>{{ tournament.category }}</p>

  </div>

</div>

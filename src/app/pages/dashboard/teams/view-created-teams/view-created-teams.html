<div class="container">

  <h2>Equipos creados</h2>

  <button (click)="addTeam()">
    Agregar Equipo
  </button>




  <div *ngIf="teams.length > 0">

    <div 
      *ngFor="let team of teams" 
      class="team-card"
      
    >
      <h3>{{ team.name }}</h3>
      <button (click)="openManageTeam(team.id)">Gestionar Equipo</button>
      <button (click)="deleteTeam(team.id)">eliminar Equipo</button>

    </div>

  </div>

</div>

<div class="container">

  <h2>Equipos creados</h2>

  <button (click)="addTeam()">
    Agregar equipo
  </button>

  <div *ngIf="teams.length === 0">
    <p>No existen equipos creados.</p>
  </div>

  <div *ngIf="teams.length > 0">

    <div 
      *ngFor="let team of teams" 
      class="team-card"
      (click)="openManageTeam(team.id)"
    >
      <h3>{{ team.name }}</h3>
      <p>Categoría: {{ team.category }}</p>
    </div>

  </div>

</div>

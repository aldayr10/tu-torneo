<p>view-created-teams works!</p>
<div class="container">

  <h2>Equipos creados</h2>

  <button (click)="addTeam()">Agregar equipo</button>

  <div *ngIf="teams.length === 0">
    <p>No existen equipos creados.</p>
  </div>

  <div *ngIf="teams.length > 0">

    <div *ngFor="let team of teams" class="team-card">
      <h3>{{ team.name }}</h3>
    </div>

  </div>

</div>

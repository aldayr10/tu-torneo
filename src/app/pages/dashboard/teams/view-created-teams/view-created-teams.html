<div class="container">

  <h2>Equipos creados</h2>

  @if (teams$ | async; as teams) {

    @if (teams.length > 0) {

      @for (team of teams; track team.id) {
        <div class="team-card">
          <div (click)="openManageTeam(team.id)">
            <h3>{{ team.name }}</h3>
          </div>

          <div class="buttos-card-team">
            <button class="settings" >
              <span class="material-symbols-outlined">settings</span>
            </button>


            <button class="delete" (click)="deleteTeam(team.id)">
              <span class="material-symbols-outlined">delete</span>
            </button>
          </div>
        </div>
      }

    } @else {
      <div class="group-exist">
        <span class="material-symbols-outlined">group</span>
        <div>No hay equipos aún. ¡Crea tu primer equipo!</div>
      </div>
    }
  }

</div>

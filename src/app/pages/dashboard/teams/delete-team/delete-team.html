<div class="container">

  <h2>Gestión de Equipos</h2>

  <table>

    <tr *ngFor="let equipo of equipos; let i = index">

      <td>{{ equipo.nombre }}</td>

      <td>
        <button mat-raised-button color="warn" (click)="abrirDialogoEliminar(i)">
          Eliminar equipo
        </button>
      </td>

    </tr>

  </table>

</div>

<div class="create-team-header">
  <div class="plus-icon">
    <span class="material-symbols-outlined">add</span>
  </div>

  <h2>Agregar Equipo</h2>
</div>

<form [formGroup]="teamForm" (ngSubmit)="createTeam()">

  <div>
    <label>Nombre del Equipo <span>*</span></label>
    <input type="text" formControlName="name" placeholder="Ej: Real Madrid">

    @if (teamForm.get('name')?.invalid && teamForm.get('name')?.touched) {
      <div class="validators">El nombre del equipo es obligatorio</div>
    }
  </div>

  <div>
    <label>Tipo de Equipo <span>*</span></label>
    <select formControlName="categoryId">
      <option value="" disabled>Selecciona el tipo</option>

      @for (tipo of catalogoTeam; track tipo.id) {
        <option [value]="tipo.id">
          {{ tipo.name }}
        </option>
      }
    </select>
  </div>

  <div class="colors-title">
    Colores del Equipo
  </div>

  <div class="colors">
    <div>
      <label for="Color Principal">Color Principal</label>
      <input
        type="color"
        formControlName="primaryColor"
        [style.background]="teamForm.get('primaryColor')?.value">
    </div>

    <div>
      <label>Color Secundario</label>
      <input
        type="color"
        formControlName="alternativeColor"
        [style.background]="teamForm.get('alternativeColor')?.value">
    </div>
  </div>

  <div class="color-preview"></div>

  <div
    class="upload-box"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)"
    [class.dragging]="isDragging"
  >

    <span class="material-symbols-outlined upload-icon">add_photo_alternate</span>

    <p>Haz clic para subir imagen</p>
    <small>PNG, JPG, SVG</small>

    <input
      type="file"
      accept="image/*"
      (change)="onFileSelected($event)"
      hidden
      #fileInput
    >

    <button type="button" class="file-button" (click)="fileInput.click()">
      Buscar archivo
    </button>

  </div>

  @if (imagePreview) {
    <div class="preview">
      <img [src]="imagePreview" alt="preview">
    </div>
  }

  <button type="submit" class="submit-button">
    <span class="material-symbols-outlined">add</span>
    Crear Equipo
  </button>

</form>

<h2>Crear Equipo</h2>

<form [formGroup]="teamForm" (ngSubmit)="createTeam()">

  <div>
    <label>Nombre del equipo</label>
    <input type="text" formControlName="name">
    @if (teamForm.get('name')?.invalid && teamForm.get('name')?.touched) {
      <div class="validators">El nombre del equipo es obligatorio</div>
    }
  </div>

  <div>
    <label>Categoría</label>
    <select formControlName="category" >
      @for (tipo of catalogoTeam; track tipo.id) {
      <option [value]="tipo.id" >
        {{ tipo.name }}
      </option>
      }
    </select>
  </div>

  <div class="colors">
    <div>
      <label for="Color Principal">Color Principal</label>
      <input type="color" formControlName="primaryColor" style="width:100px;height:100px;border-radius: 50px;"
        [style.background]="teamForm.get('primaryColor')?.value">
    </div>
    <div>
      <label>Color Secundario</label>
      <input type="color" formControlName="alternativeColor" style="width:100px;height:100px;border-radius: 50px;"
        [style.background]="teamForm.get('alternativeColor')?.value">
    </div>
  </div>

  <div 
  class="upload-box"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave($event)"
  (drop)="onDrop($event)"
  [class.dragging]="isDragging"
>

  <p>Arrastra una imagen aquí o haz click en buscar archivo </p>

  <input 
    type="file" 
    accept="image/*"
    (change)="onFileSelected($event)"
    hidden
    #fileInput
  >

  <button type="button" (click)="fileInput.click()">
    Buscar archivo
  </button>

</div>

@if (imagePreview) {
  <div class="preview">
    <img [src]="imagePreview" alt="preview">
  </div>
}

  <button type="submit">
    Crear equipo
  </button>

</form>

<h2>Gestión del equipo</h2>

<div *ngIf="team">

  <h3>{{team.name}}</h3>
  <p>Categoría: {{team.category}}</p>

  <h4>Jugadores actuales</h4>

  <ul>
    <li *ngFor="let player of team.players">
      Jugador: {{player.name}}
    </li>
  </ul>

  <br>

  <button (click)="openInviteForm()">Invitar jugador</button>
  <button (click)="generateInviteLink()">Generar enlace</button>

  <br><br>

  <div *ngIf="inviteLink">
    <input type="text" [value]="inviteLink" readonly>
    <button (click)="copyLink()">Copiar enlace</button>
  </div>

</div>

<!-- Formulario invitar jugador -->

<div *ngIf="showInviteForm">

  <h3>Invitar jugador</h3>

  <form [formGroup]="inviteForm" (ngSubmit)="invitePlayer()">

    <label>Email de usuario</label>
    <input type="email" formControlName="useremail">

    <div *ngIf="inviteForm.get('useremail')?.invalid && inviteForm.get('useremail')?.touched">
      El email es obligatorio
    </div>

    <br><br>

    <button type="submit">Enviar invitación</button>

  </form>

</div>

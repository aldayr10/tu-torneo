<p>join-team works!</p>
<h5>Enviar Solicitud de Unión</h5>
<form [formGroup]="joinForm" (ngSubmit)="joinTeam()">
  <div class="form-group">
    <label for="email">Email</label>
    <input type="email" class="form-control" id="email" formControlName="email">
  </div>
  <div class="form-group">
    <label for="password">Contraseña</label>
    <input type="password" class="form-control" id="password" formControlName="password">
  </div>
  <button type="submit" class="btn btn-primary">Enviar</button>
  <div *ngIf="mostrarPopup">
    <app-check-email></app-check-email>
    <p>Te enviaremos un enlace a tu email</p>
    <p>Revisa tu bandeja de entrada y sigue las instrucciones para unirte a tu equipo.</p>
    <button class="btn btn-primary" (click)="goToLogin()">Volver a Inicio</button>
  </div>

@if (!mostrarPopup) {

  <div class="overlay">

    <div class="card-recover">

      <button type="button" class="back-login" (click)="volverLogin()">
        <span class="material-symbols-outlined">arrow_back</span>
        Volver al Login
      </button>

      <div class="title-icon">
        <span class="material-symbols-outlined">trophy</span>
      </div>

      <p class="title">Recuperar Contraseña</p>

      <h5 class="subtitle">Te enviaremos un enlace a tu email</h5>

      <form [formGroup]="recoverForm" (ngSubmit)="recoverPassword()">

        <label>Email</label>

        <div class="input-icon">
          <span class="material-symbols-outlined">mail</span>
          <input 
            type="email"
            placeholder="tu@email.com"
            formControlName="email">
        </div>

        <button type="submit" class="btn-primary">
          Enviar Enlace de Recuperación
        </button>

      </form>

      <div class="footer-text">
        ¿Recordaste tu contraseña?
        <span (click)="volverLogin()">Inicia sesión</span>
      </div>

    </div>

  </div>

} @else {

  <app-check-email></app-check-email>

}

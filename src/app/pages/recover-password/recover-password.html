
  
<div class="overlay" *ngIf="!mostrarPopup">
  <p>Recuperara Contraseña</p>
  <h5>Te enviaremos un enlace a tu email</h5>
  <form [formGroup]="recoverForm" (ngSubmit)="recoverPassword()">
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" class="form-control" id="email" formControlName="email">
    </div>
    <button type="submit" class="btn btn-primary">Enviar</button>
  </form>
</div>
<div *ngIf="mostrarPopup">
    <app-check-email></app-check-email>
</div>
